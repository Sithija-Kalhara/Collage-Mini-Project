<!DOCTYPE html>
<html>
<head>
  <title>Flight Services Rating</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>✈️ Flight Services Rating</h1>

<div class="gallery">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=500">
    <h2>✈️ Flight Booking</h2>
    <div class="stars">
      <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
    </div>
    <p class="result">Click a star to rate</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1540339832862-474599807836?w=500">
    <h2>🧳 Baggage Service</h2>
    <div class="stars">
      <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
    </div>
    <p class="result">Click a star to rate</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1569154941061-e231b4725ef1?w=500">
    <h2>🍱 In-Flight Food</h2>
    <div class="stars">
      <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
    </div>
    <p class="result">Click a star to rate</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
