<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FH5 LIVE 🚗 | Chill Racing with Wheel | Mr.Flexy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="player" aria-labelledby="stream-title">
    <div class="player__hero">
      <div>
        <p class="eyebrow">Live Stream</p>
        <h1 id="stream-title">FH5 LIVE 🚗 | Chill Racing with Wheel | Mr.Flexy</h1>
        <p class="player__subtitle">Catch the chill racing action with immersive gameplay, ambient tunes, and real-time reactions.</p>
      </div>
    </div>

    <section class="video-container" aria-label="Live stream video">
      <iframe
        src="https://www.youtube.com/embed/kD9_viBRXuM?autoplay=1&mute=1"
        title="FH5 LIVE 🚗 | Chill Racing with Wheel | Mr.Flexy"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>
    </section>

    <section class="rating-panel" aria-labelledby="rating-title">
      <div class="rating-panel__intro">
        <h2 id="rating-title">Rate this stream</h2>
        <p>Share your feedback and help us keep the vibes strong.</p>
      </div>

      <div class="stars" data-rating-id="main-stream" role="radiogroup" aria-label="Stream rating">
        <span>★</span>
        <span>★</span>
        <span>★</span>
        <span>★</span>
        <span>★</span>
      </div>

      <div class="result">Tap a star to rate this stream.</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
